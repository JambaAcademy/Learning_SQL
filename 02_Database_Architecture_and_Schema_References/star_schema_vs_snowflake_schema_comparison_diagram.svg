  <text x="428" y="286" text-anchor="middle" font-size="11" font-weight="bold" fill="#0f4c81">DIM_PRODUCT</text>
  <text x="428" y="308" text-anchor="middle" font-size="10" fill="#fbbf24">🔑 product_id (PK)</text>
  <text x="428" y="323" text-anchor="middle" font-size="10" fill="#bae6fd">product_name</text>
  <text x="428" y="338" text-anchor="middle" font-size="10" fill="#bae6fd">category, brand</text>
  <text x="428" y="353" text-anchor="middle" font-size="10" fill="#bae6fd">unit_price</text>
  <text x="428" y="368" text-anchor="middle" font-size="9" font-style="italic" fill="#38bdf8">Dimension Table</text>

  <!-- Arrow: FACT → DIM_PRODUCT -->
  <line x1="315" y1="335" x2="356" y2="335" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- ── DIM_CUSTOMER (bottom) ── -->
  <rect x="168" y="440" width="144" height="110" rx="7" fill="#0f4c81" stroke="#38bdf8" stroke-width="2"/>
  <rect x="168" y="440" width="144" height="24" rx="7" fill="#38bdf8"/>
  <rect x="168" y="456" width="144" height="8" fill="#38bdf8"/>
  <text x="240" y="456" text-anchor="middle" font-size="11" font-weight="bold" fill="#0f4c81">DIM_CUSTOMER</text>
  <text x="240" y="477" text-anchor="middle" font-size="10" fill="#fbbf24">🔑 customer_id (PK)</text>
  <text x="240" y="492" text-anchor="middle" font-size="10" fill="#bae6fd">full_name, email</text>
  <text x="240" y="507" text-anchor="middle" font-size="10" fill="#bae6fd">city, region</text>
  <text x="240" y="522" text-anchor="middle" font-size="10" fill="#bae6fd">loyalty_tier</text>
  <text x="240" y="537" text-anchor="middle" font-size="9" font-style="italic" fill="#38bdf8">Dimension Table</text>

  <!-- Arrow: FACT → DIM_CUSTOMER -->
  <line x1="240" y1="400" x2="240" y2="440" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- ── DIM_STORE (left) ── -->
  <rect x="36" y="270" width="100" height="110" rx="7" fill="#0f4c81" stroke="#38bdf8" stroke-width="2"/>
  <rect x="36" y="270" width="100" height="24" rx="7" fill="#38bdf8"/>
  <rect x="36" y="286" width="100" height="8" fill="#38bdf8"/>
  <text x="86" y="286" text-anchor="middle" font-size="11" font-weight="bold" fill="#0f4c81">DIM_STORE</text>
  <text x="86" y="308" text-anchor="middle" font-size="10" fill="#fbbf24">🔑 store_id (PK)</text>
  <text x="86" y="323" text-anchor="middle" font-size="10" fill="#bae6fd">store_name</text>
  <text x="86" y="338" text-anchor="middle" font-size="10" fill="#bae6fd">city, region</text>
  <text x="86" y="353" text-anchor="middle" font-size="10" fill="#bae6fd">country</text>
  <text x="86" y="368" text-anchor="middle"
