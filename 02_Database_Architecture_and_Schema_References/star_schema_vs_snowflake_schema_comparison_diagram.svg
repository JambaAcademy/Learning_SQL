<svg viewBox="0 0 960 700" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="960" height="700" fill="#f8f9fc" rx="12"/>

  <!-- Main Title -->
  <text x="480" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">Star Schema vs. Snowflake Schema</text>
  <text x="480" y="58" text-anchor="middle" font-size="12" fill="#555">Data Warehouse Design Structures — Chapter 12</text>

  <!-- Divider line -->
  <line x1="480" y1="70" x2="480" y2="680" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ============================================================ -->
  <!--                     STAR SCHEMA (LEFT)                       -->
  <!-- ============================================================ -->

  <!-- Star Schema Label -->
  <rect x="30" y="76" width="420" height="32" rx="6" fill="#1a1a2e"/>
  <text x="240" y="97" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">⭐  STAR SCHEMA</text>

  <!-- Star Schema description -->
  <text x="240" y="122" text-anchor="middle" font-size="11" fill="#475569">Denormalised dimensions — fewer JOINs, faster queries</text>

  <!-- ── FACT TABLE (centre) ── -->
  <rect x="165" y="270" width="150" height="130" rx="8" fill="#1a1a2e" stroke="#f59e0b" stroke-width="3"/>
  <rect x="165" y="270" width="150" height="28" rx="8" fill="#f59e0b"/>
  <rect x="165" y="290" width="150" height="8" fill="#f59e0b"/>
  <text x="240" y="289" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">FACT_SALES</text>
  <text x="240" y="314" text-anchor="middle" font-size="10" fill="#fbbf24">🔑 sale_id (PK)</text>
  <text x="240" y="330" text-anchor="middle" font-size="10" fill="#94a3b8">🔗 date_id (FK)</text>
  <text x="240" y="346" text-anchor="middle" font-size="10" fill="#94a3b8">🔗 product_id (FK)</text>
  <text x="240" y="362" text-anchor="middle" font-size="10" fill="#94a3b8">🔗 customer_id (FK)</text>
  <text x="240" y="378" text-anchor="middle" font-size="10" fill="#94a3b8">🔗 store_id (FK)</text>
  <text x="240" y="394" text-anchor="middle" font-size="10" fill="#e2e8f0">revenue, quantity</text>
  <text x="240" y="420" text-anchor="middle" font-size="9" font-style="italic" fill="#f59e0b">Fact Table — measures &amp; keys</text>

  <!-- ── DIM_DATE (top) ── -->
  <rect x="168" y="140" width="144" height="100" rx="7" fill="#0f4c81" stroke="#38bdf8" stroke-width="2"/>
  <rect x="168" y="140" width="144" height="24" rx="7" fill="#38bdf8"/>
  <rect x="168" y="156" width="144" height="8" fill="#38bdf8"/>
  <text x="240" y="156" text-anchor="middle" font-size="11" font-weight="bold" fill="#0f4c81">DIM_DATE</text>
  <text x="240" y="176" text-anchor="middle" font-size="10" fill="#fbbf24">🔑 date_id (PK)</text>
  <text x="240" y="191" text-anchor="middle" font-size="10" fill="#bae6fd">day, month, quarter</text>
  <text x="240" y="206" text-anchor="middle" font-size="10" fill="#bae6fd">year, day_of_week</text>
  <text x="240" y="221" text-anchor="middle" font-size="10" fill="#bae6fd">is_holiday</text>
  <text x="240" y="236" text-anchor="middle" font-size="9" font-style="italic" fill="#38bdf8">Dimension Table</text>

  <!-- Arrow: DIM_DATE → FACT -->
  <line x1="240" y1="240" x2="240" y2="270" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- ── DIM_PRODUCT (right) ── -->
  <rect x="356" y="270" width="144" height="110" rx="7" fill="#0f4c81" stroke="#38bdf8" stroke-width="2"/>
  <rect x="356" y="270" width="144" height="24" rx="7" fill="#38bdf8"/>
