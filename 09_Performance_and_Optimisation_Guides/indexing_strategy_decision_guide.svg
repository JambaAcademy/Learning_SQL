<svg viewBox="0 0 900 1200" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, serif">

  <!-- Background -->
  <rect width="900" height="1200" fill="#f8f6f2" rx="8"/>

  <!-- Title Block -->
  <rect x="50" y="20" width="800" height="70" rx="8" fill="#1a3a5c" stroke="#0d2438" stroke-width="2"/>
  <text x="450" y="48" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="bold">Indexing Strategy Decision Guide</text>
  <text x="450" y="70" text-anchor="middle" fill="#a8c4e0" font-size="12">Operationalising Chapters 12 &amp; 15 — Which Columns Warrant an Index?</text>

  <!-- Legend -->
  <rect x="620" y="105" width="230" height="105" rx="6" fill="#ffffff" stroke="#cccccc" stroke-width="1.5"/>
  <text x="735" y="122" text-anchor="middle" fill="#1a3a5c" font-size="11" font-weight="bold">LEGEND</text>
  <rect x="632" y="130" width="20" height="14" rx="3" fill="#1a3a5c"/>
  <text x="660" y="142" fill="#333" font-size="10">Start / End</text>
  <rect x="632" y="150" width="20" height="14" rx="3" fill="#e8f4e8" stroke="#2d7a2d" stroke-width="1.5"/>
  <text x="660" y="162" fill="#333" font-size="10">Decision (Yes/No)</text>
  <rect x="632" y="170" width="20" height="14" rx="3" fill="#fff3cd" stroke="#b8860b" stroke-width="1.5"/>
  <text x="660" y="182" fill="#333" font-size="10">Action / Outcome</text>
  <rect x="632" y="190" width="20" height="14" rx="3" fill="#fde8e8" stroke="#c0392b" stroke-width="1.5"/>
  <text x="660" y="202" fill="#333" font-size="10">Warning / Avoid</text>

  <!-- ============================================================ -->
  <!-- NODE 1: START -->
  <!-- ============================================================ -->
  <rect x="325" y="105" width="240" height="50" rx="25" fill="#1a3a5c" stroke="#0d2438" stroke-width="2"/>
  <text x="445" y="126" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">START: Candidate Column</text>
  <text x="445" y="143" text-anchor="middle" fill="#a8c4e0" font-size="11">Identify column for indexing review</text>

  <!-- Arrow 1→2 -->
  <line x1="445" y1="155" x2="445" y2="185" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============================================================ -->
  <!-- NODE 2: Is it a PRIMARY KEY? -->
  <!-- ============================================================ -->
  <rect x="295" y="185" width="300" height="55" rx="6" fill="#e8f4e8" stroke="#2d7a2d" stroke-width="2"/>
  <text x="445" y="207" text-anchor="middle" fill="#1a3a5c" font-size="13" font-weight="bold">Is this a PRIMARY KEY?</text>
  <text x="445" y="225" text-anchor="middle" fill="#555" font-size="10">(Fact table IDs, dimension table IDs)</text>
  <text x="445" y="237" text-anchor="middle" fill="#555" font-size="10">e.g. customer_id, order_id, product_id</text>

  <!-- YES branch right from Node 2 -->
  <line x1="595" y1="212" x2="660" y2="212" stroke="#2d7a2d" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="625" y="207" text-anchor="middle" fill="#2d7a2d" font-size="11" font-weight="bold">YES</text>

  <!-- Outcome A: Auto-indexed -->
  <rect x="660" y="185" width="190" height="55" rx="6" fill="#fff3cd" stroke="#b8860b" stroke-width="2"/>
  <text x="755" y="206" text-anchor="middle" fill="#1a3a5c" font-size="12" font-weight="bold">AUTO-INDEXED</text>
  <text x="755" y="221" text-anchor="middle" fill="#555" font-size="10">Database creates clustered</text>
  <text x="755" y="233" text-anchor="middle" fill="#555" font-size="10">index automatically. No action.</text>

  <!-- NO arrow down from Node 2 -->
  <line x1="445" y1="240" x2="445" y2="270" stroke="#c0392b" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="455" y="258" fill="#c0392b" font-size="11" font-weight="bold">NO</text>

  <!-- ============================================================ -->
  <!-- NODE 3: Is it a FOREIGN KEY used in JOINs? -->
  <!-- ============================================================ -->
  <rect x="270" y="270" width="350" height="60" rx="6" fill="#e8f4e8" stroke="#2d7a2d" stroke-width="2"/>
  <text x="445" y="292" text-anchor="middle" fill="#1a3a5c" font-size="13" font-weight="bold">Is it a FOREIGN KEY used in JOINs?</text>
  <text x="445" y="308" text-anchor="middle" fill="#555" font-size="10">e.g. orders.customer_id linking fact → dimension</text>
  <text x="445" y="320" text-anchor="middle" fill="#555" font-size="10">Star/snowflake schema join columns</text>

  <!-- YES branch right from Node 3 -->
  <line x1="620" y1="300" x2="660" y2="300" stroke="#2d7a2d" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="637" y="295" text-anchor="middle" fill="#2d7a2d" font-size="11" font-weight="bold">YES</text>

  <!-- Outcome B: Strong Index Candidate -->
  <rect x="660" y="270" width="190" height="60" rx="6" fill="#fff3cd" stroke="#b8860b" stroke-width="2"/>
  <text x="755" y="291" text-anchor="middle" fill="#1a3a5c" font-size="12" font-weight="bold">STRONG CANDIDATE</text>
  <text x="755" y="307" text-anchor="middle" fill="#555" font-size="10">Index this column. Frequent</text>
  <text x="755" y="319" text-anchor="middle" fill="#555" font-size="10">JOINs reward the index cost.</text>

  <!-- NO arrow down -->
  <line x1="445" y1="330" x2="445" y2="365" stroke="#c0392b" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="455" y="350" fill="#c0392b" font-size="11" font-weight="bold">NO</text>

  <!-- ============================================================ -->
  <!-- NODE 4: Appears in WHERE clause frequently? -->
  <!-- ============================================================ -->
  <rect x="255" y="365" width="380" height="60" rx="6" fill="#e8f4e8" stroke="#2d7a2d" stroke-width="2"/>
  <text x="445" y="387" text-anchor="middle" fill="#1a3a5c" font-size="13" font-weight="bold">Does it appear in WHERE clauses frequently?</text>
  <text x="445" y="403" text-anchor="middle" fill="#555" font-size="10">Filters driving most queries against this table</text>
  <text x="445" y="415" text-anchor="middle" fill="#555" font-size="10">e.g. order_date, status, region</text>

  <!-- YES arrow right -->
  <line x1="635" y1="395" x2="660" y2="395" stroke="#2d7a2d" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="645" y="390" text-anchor="middle" fill="#2d7a2d" font-size="11" font-weight="bold">YES</text>

  <!-- Outcome C box (right) -->
  <rect x="660" y="365" width="190" height="60" rx="6" fill="#e8f4e8" stroke="#2d7a2d" stroke-width="2"/>
  <text x="755" y="384" text-anchor="middle" fill="#1a3a5c" font-size="12" font-weight="bold">PROCEED TO</text>
  <text x="755" y="399" text-anchor="middle" fill="#1a3a5c" font-size="12" font-weight="bold">CARDINALITY CHECK</text>
  <text x="755" y="413" text-anchor="middle" fill="#555" font-size="10">→
